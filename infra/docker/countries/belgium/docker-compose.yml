    container_name: landomo-be-scraper-immovlan
    restart: unless-stopped
    networks:
      - landomo-be
    ports:
      - "8212:8212"
    environment:
      PORT: 8212
      INGEST_API_URL: http://ingest-api-be:3000
      INGEST_API_KEY: ${API_KEY_BE}
      REDIS_HOST: redis-be
