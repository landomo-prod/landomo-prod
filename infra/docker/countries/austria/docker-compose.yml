version: '3.8'

# ============================================================
# Landomo-World - Austria Only Docker Compose
# ============================================================
# Standalone AT deployment for dedicated VPS
# Uses existing cz-postgres for database
# Usage: docker compose -f docker-compose.at.yml up -d
# ============================================================

secrets:
  db_password:
    file: ./secrets/db_password
  redis_password:
    file: ./secrets/redis_password
  api_keys_austria:
    file: ./secrets/api_keys_austria

networks:
  at-network:
    driver: bridge

volumes:
  at_redis_data:

services:

  # ============================================================
  # REDIS - Job Queue
  # ============================================================
  at-redis:
    image: redis:7-alpine
    container_name: at-redis
    command: >
      sh -c '
        if [ -f /run/secrets/redis_password ]; then
          redis-server --appendonly yes --appendfsync everysec --maxmemory 4gb --maxmemory-policy noeviction --save 900 1 --save 300 10 --save 3600 100000 --activedefrag yes --active-defrag-ignore-bytes 100mb --active-defrag-threshold-lower 10 --active-defrag-threshold-upper 100 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25 --requirepass "$$(cat /run/secrets/redis_password)"
        else
          redis-server --appendonly yes --appendfsync everysec --maxmemory 4gb --maxmemory-policy noeviction --save 900 1 --save 300 10 --save 3600 100000 --activedefrag yes --active-defrag-ignore-bytes 100mb --active-defrag-threshold-lower 10 --active-defrag-threshold-upper 100 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25
        fi
      '
    secrets:
      - redis_password
    volumes:
      - at_redis_data:/data
    networks:
      - at-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password 2>/dev/null)\" ping 2>/dev/null || redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # INGEST SERVICE - Austria
  # ============================================================
  at-ingest:
    build:
      context: ..
      dockerfile: ingest-service/Dockerfile
    container_name: at-ingest
    secrets:
      - db_password
      - redis_password
      - source: api_keys_austria
        target: api_keys
    environment:
      - INSTANCE_COUNTRY=at
      - PORT=3000
      - HOST=0.0.0.0
      - DB_HOST=cz-postgres
      - DB_PORT=5432
      - DB_NAME=landomo_at
      - DB_USER=${DB_USER:-landomo}
      - DB_PASSWORD=${DB_PASSWORD:-landomo_dev_pass}
      - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-20}
      - REDIS_HOST=at-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - API_KEYS=${API_KEYS_AT:-dev_key_at_1,dev_key_at_2}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10000}
      - BATCH_WORKERS=${BATCH_WORKERS:-10}
    ports:
      - "3013:3000"
    depends_on:
      at-redis:
        condition: service_healthy
    networks:
      - at-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # WORKER - Austria BullMQ processor
  # ============================================================
  at-worker:
    build:
      context: ..
      dockerfile: ingest-service/Dockerfile
    container_name: at-worker
    command: ["node", "dist/start-worker.js"]
    secrets:
      - db_password
      - redis_password
    environment:
      - INSTANCE_COUNTRY=at
      - DB_HOST=cz-postgres
      - DB_PORT=5432
      - DB_NAME=landomo_at
      - DB_USER=${DB_USER:-landomo}
      - DB_PASSWORD=${DB_PASSWORD:-landomo_dev_pass}
      - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-20}
      - REDIS_HOST=at-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10000}
      - BATCH_WORKERS=${BATCH_WORKERS:-10}
      - STALENESS_THRESHOLD_HOURS=${STALENESS_THRESHOLD_HOURS:-72}
      - STALENESS_CRON=${STALENESS_CRON:-0 */6 * * *}
      - STALENESS_BATCH_SIZE=${STALENESS_BATCH_SIZE:-500}
    depends_on:
      at-ingest:
        condition: service_healthy
    networks:
      - at-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -e /proc/1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # AUSTRIA SCRAPERS
  # ============================================================

  # Willhaben.at (largest Austrian portal)
  scraper-willhaben-at:
    build:
      context: ../../scrapers/Austria/willhaben-at
    container_name: at-scraper-willhaben
    environment:
      - PORT=8115
      - INGEST_API_URL=http://at-ingest:3000
      - INGEST_API_KEY=dev_key_at_1
      - REDIS_HOST=at-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8115:8115"
    depends_on:
      at-ingest:
        condition: service_healthy
    networks:
      - at-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8115/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ImmobilienScout24.at
  scraper-immobilienscout24-at:
    build:
      context: ../../scrapers/Austria/immobilienscout24-at
    container_name: at-scraper-immobilienscout24
    environment:
      - PORT=8116
      - INGEST_API_URL=http://at-ingest:3000
      - INGEST_API_KEY=dev_key_at_1
      - REDIS_HOST=at-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8116:8116"
    depends_on:
      at-ingest:
        condition: service_healthy
    networks:
      - at-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8116/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Wohnnet.at
  scraper-wohnnet-at:
    build:
      context: ../../scrapers/Austria/wohnnet-at
    container_name: at-scraper-wohnnet
    environment:
      - PORT=8117
      - INGEST_API_URL=http://at-ingest:3000
      - INGEST_API_KEY=dev_key_at_1
      - REDIS_HOST=at-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8117:8117"
    depends_on:
      at-ingest:
        condition: service_healthy
    networks:
      - at-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8117/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Immowelt.at
  scraper-immowelt-at:
    build:
      context: ../../scrapers/Austria/immowelt-at
    container_name: at-scraper-immowelt
    environment:
      - PORT=8118
      - INGEST_API_URL=http://at-ingest:3000
      - INGEST_API_KEY=dev_key_at_1
      - REDIS_HOST=at-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8118:8118"
    depends_on:
      at-ingest:
        condition: service_healthy
    networks:
      - at-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8118/health"]
      interval: 30s
