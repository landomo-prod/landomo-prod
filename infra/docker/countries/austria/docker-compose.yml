      retries: 3
      start_period: 30s

  # ImmoDirekt.at
  scraper-immodirekt-at:
    build:
      context: ../../scrapers/Austria/immodirekt-at
    container_name: at-scraper-immodirekt
    environment:
      - PORT=8119
      - INGEST_API_URL=http://at-ingest:3000
      - INGEST_API_KEY=dev_key_at_1
