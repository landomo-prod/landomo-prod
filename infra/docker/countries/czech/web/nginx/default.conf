# ─── Main domains: landomo.cz / landomo.com → Waitlist ───────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name landomo.cz www.landomo.cz landomo.com www.landomo.com;

    client_max_body_size 25m;

    # Cloudflare real IP (trust CF proxy)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Canonical: www → non-www
    if ($host = www.landomo.cz) {
        return 301 $scheme://landomo.cz$request_uri;
    }
    if ($host = www.landomo.com) {
        return 301 $scheme://landomo.com$request_uri;
    }

    # Segment + ref: /portal/sam → /?segment=portal&ref=sam
    location ~ ^/(portal)/([a-zA-Z0-9_-]+)/?$ {
        return 302 /?segment=$1&ref=$2;
    }

    # Segment only: /portal → /?segment=portal
    location ~ ^/(portal)/?$ {
        return 302 /?segment=$1;
    }

    # Referral codes: /sam → /?ref=sam
    location ~ ^/(?!en|cs|api|_next|manifest|icon|favicon|robots|sitemap|privacy|portal)([a-zA-Z0-9_-]+)/?$ {
        return 302 /?ref=$1;
    }

    # Legacy /waitlist/* redirects
    location = /waitlist {
        return 301 /;
    }
    location = /waitlist/ {
        return 301 /;
    }
    location ~ ^/waitlist/(.+)$ {
        return 301 /$1;
    }

    # Legacy /en, /cs redirects → root
    location = /en {
        return 301 /;
    }
    location = /cs {
        return 301 /;
    }

    # Waitlist API
    location /api/ {
        proxy_pass http://cz-waitlist-api:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

    # Static assets — immutable cache
    location /_next/static/ {
        root /var/www/waitlist;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Privacy page — serve locale-specific file
    location = /privacy {
        root /var/www/waitlist;
        try_files /$locale/privacy.html /en/privacy.html;
        add_header Cache-Control "public, max-age=60, s-maxage=300";
    }

    # Root — serve locale-specific landing page
    location = / {
        root /var/www/waitlist;
        try_files /$locale.html /en.html;
        add_header Cache-Control "public, max-age=60, s-maxage=300";
    }

    # Other static files (favicon, manifest, etc.)
    location / {
        root /var/www/waitlist;
        try_files $uri $uri.html $uri/ /$locale.html;
        add_header Cache-Control "public, max-age=60, s-maxage=300";
    }
}

# ─── Alpha subdomain: alpha.landomo.cz / alpha.landomo.com → Frontend ───────
server {
    listen 80;
    listen [::]:80;
    server_name alpha.landomo.cz alpha.landomo.com;

    client_max_body_size 25m;

    # Cloudflare real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Search API proxy → app server
    location /api/ {
        proxy_pass http://46.225.167.44:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Supabase Auth proxy → app server (Kong gateway)
    # Avoids mixed-content when frontend is served over HTTPS via Cloudflare
    location /supabase/ {
        proxy_pass http://46.225.167.44:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Frontend (Next.js SSR)
    location / {
        proxy_pass http://cz-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://cz-frontend:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ─── Direct IP access — fallback to English waitlist ─────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;

    # Legacy redirects
    location = /waitlist {
        return 301 /;
    }
    location = /waitlist/ {
        return 301 /;
    }
    location ~ ^/waitlist/(.+)$ {
        return 301 /$1;
    }
    location = /en {
        return 301 /;
    }
    location = /cs {
        return 301 /;
    }

    location /api/ {
        proxy_pass http://cz-waitlist-api:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

    location /_next/static/ {
        root /var/www/waitlist;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location = /privacy {
        root /var/www/waitlist;
        try_files /en/privacy.html =404;
        add_header Cache-Control "public, max-age=60, s-maxage=300";
    }

    location / {
        root /var/www/waitlist;
        try_files $uri $uri.html $uri/ /en.html;
        add_header Cache-Control "public, max-age=60, s-maxage=300";
    }
}
