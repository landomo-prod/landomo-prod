services:
  cz-frontend:
    build:
      context: /opt/landomo/source
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY}
        NEXT_PUBLIC_DEFAULT_MAP_CENTER_LAT: ${NEXT_PUBLIC_DEFAULT_MAP_CENTER_LAT:-50.0755}
        NEXT_PUBLIC_DEFAULT_MAP_CENTER_LNG: ${NEXT_PUBLIC_DEFAULT_MAP_CENTER_LNG:-14.4378}
        NEXT_PUBLIC_DEFAULT_MAP_ZOOM: ${NEXT_PUBLIC_DEFAULT_MAP_ZOOM:-13}
        NEXT_PUBLIC_ENABLE_MOCK_DATA: ${NEXT_PUBLIC_ENABLE_MOCK_DATA:-false}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    container_name: cz-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY}
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => { if (r.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # Static file builder — builds waitlist HTML, copies to shared volume
  cz-waitlist-static:
    build:
      context: /opt/landomo/source
      dockerfile: waitlist/Dockerfile
    container_name: cz-waitlist-static
    restart: "no"
    volumes:
      - waitlist-static:/out

  # Waitlist API — tiny Node.js server for email submissions (SQLite)
  cz-waitlist-api:
    build:
      context: /opt/landomo/source
      dockerfile: waitlist-api/Dockerfile
    container_name: cz-waitlist-api
    restart: unless-stopped
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM=${RESEND_FROM:-Samuel from Landomo <hello@landomo.cz>}
      - RESEND_REPLY_TO=${RESEND_REPLY_TO:-hello@landomo.cz}
      - ALLOWED_ORIGINS=http://91.99.110.217,https://landomo.cz,https://www.landomo.cz,https://landomo.com,https://www.landomo.com
      - UNSUBSCRIBE_SECRET=${UNSUBSCRIBE_SECRET}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    volumes:
      - waitlist-data:/app/data
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', (r) => { if (r.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  cz-web-nginx:
    image: nginx:alpine
    container_name: cz-web-nginx
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - waitlist-static:/var/www/waitlist:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      cz-frontend:
        condition: service_healthy
      cz-waitlist-api:
        condition: service_healthy
      cz-waitlist-static:
        condition: service_completed_successfully
    networks:
      - web-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    image: certbot/certbot
    container_name: cz-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  web-network:
    driver: bridge

volumes:
  certbot-etc:
  certbot-var:
  certbot-webroot:
  waitlist-data:
  waitlist-static:
