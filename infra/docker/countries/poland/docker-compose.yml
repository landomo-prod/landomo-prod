version: '3.8'

networks:
  landomo-pl:
    name: landomo-pl-network
    driver: bridge

volumes:
  postgres-pl-data:
    name: landomo-pl-postgres-data
  redis-pl-data:
    name: landomo-pl-redis-data

services:
  redis-pl:
    image: redis:7-alpine
    container_name: landomo-pl-redis
    restart: unless-stopped
    networks:
      - landomo-pl
    ports:
      - "6383:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    volumes:
      - redis-pl-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres-pl:
    image: imresamu/postgis:16-3.4-alpine
    container_name: landomo-pl-postgres
    restart: unless-stopped
    networks:
      - landomo-pl
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: landomo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: landomo_pl
    volumes:
      - postgres-pl-data:/var/lib/postgresql/data
    shm_size: 256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landomo -d landomo_pl"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ingest-api-pl:
    build:
      context: ..
      dockerfile: ingest-service/Dockerfile
    container_name: landomo-pl-ingest-api
    restart: unless-stopped
    networks:
      - landomo-pl
    ports:
      - "3015:3000"
    environment:
      INSTANCE_COUNTRY: pl
      DB_HOST: landomo-pl-postgres
      DB_PORT: 5432
      DB_NAME: landomo_pl
      DB_USER: landomo
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: landomo-pl-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      API_KEYS: ${API_KEYS_PL}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres-pl:
        condition: service_healthy
      redis-pl:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  batch-worker-pl-1:
    build:
      context: ..
      dockerfile: ingest-service/Dockerfile
    container_name: landomo-pl-batch-worker-1
    restart: unless-stopped
    networks:
      - landomo-pl
    environment:
      INSTANCE_COUNTRY: pl
      DB_HOST: landomo-pl-postgres
      DB_PORT: 5432
      DB_NAME: landomo_pl
      DB_USER: landomo
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: landomo-pl-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BATCH_SIZE: 25
      BATCH_WORKERS: 5
      BATCH_TIMEOUT: 120000
      NODE_ENV: production
    command: node dist/start-worker.js
    depends_on:
      postgres-pl:
        condition: service_healthy
      redis-pl:
        condition: service_healthy

  batch-worker-pl-2:
    build:
      context: ..
      dockerfile: ingest-service/Dockerfile
    container_name: landomo-pl-batch-worker-2
    restart: unless-stopped
    networks:
      - landomo-pl
    environment:
      INSTANCE_COUNTRY: pl
      DB_HOST: landomo-pl-postgres
      DB_PORT: 5432
      DB_NAME: landomo_pl
      DB_USER: landomo
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: landomo-pl-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BATCH_SIZE: 25
      BATCH_WORKERS: 5
      BATCH_TIMEOUT: 120000
      NODE_ENV: production
    command: node dist/start-worker.js
    depends_on:
      postgres-pl:
        condition: service_healthy
      redis-pl:
        condition: service_healthy

  scraper-adresowo-pl:
    build:
      context: ../../..
      dockerfile: scrapers/Poland/adresowo-pl/Dockerfile
    container_name: landomo-pl-scraper-adresowo
    restart: unless-stopped
    networks:
      - landomo-pl
    ports:
      - "8201:8201"
    environment:
      PORT: 8201
      INGEST_API_URL: http://landomo-pl-ingest-api:3000
      INGEST_API_KEY: ${API_KEYS_PL}
      REDIS_HOST: landomo-pl-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      WORKER_CONCURRENCY: 30
      NODE_ENV: production
    depends_on:
      ingest-api-pl:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8201/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  scraper-nieruchomosci-pl:
    build:
      context: ../../..
      dockerfile: scrapers/Poland/nieruchomosci-online-pl/Dockerfile
    container_name: landomo-pl-scraper-nieruchomosci
    restart: unless-stopped
    networks:
      - landomo-pl
    ports:
      - "8202:8202"
    environment:
      PORT: 8202
      INGEST_API_URL: http://landomo-pl-ingest-api:3000
      INGEST_API_KEY: ${API_KEYS_PL}
      REDIS_HOST: landomo-pl-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      WORKER_CONCURRENCY: 30
      NODE_ENV: production
    depends_on:
      ingest-api-pl:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8202/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
