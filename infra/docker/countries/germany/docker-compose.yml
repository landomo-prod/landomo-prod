version: '3.8'

# ============================================================
# Landomo-World - Germany Only Docker Compose
# ============================================================
# Standalone DE deployment for dedicated VPS
# Uses existing cz-postgres for database
# Usage: docker compose -f docker-compose.de.yml up -d
# ============================================================

secrets:
  db_password:
    file: ./secrets/db_password
  redis_password:
    file: ./secrets/redis_password
  api_keys_germany:
    file: ./secrets/api_keys_germany

networks:
  de-network:
    driver: bridge

volumes:
  de_redis_data:

services:

  # ============================================================
  # REDIS - Job Queue
  # ============================================================
  de-redis:
    image: redis:7-alpine
    container_name: de-redis
    command: >
      sh -c '
        if [ -f /run/secrets/redis_password ]; then
          redis-server --appendonly yes --appendfsync everysec --maxmemory 4gb --maxmemory-policy noeviction --save 900 1 --save 300 10 --save 3600 100000 --activedefrag yes --active-defrag-ignore-bytes 100mb --active-defrag-threshold-lower 10 --active-defrag-threshold-upper 100 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25 --requirepass "$$(cat /run/secrets/redis_password)"
        else
          redis-server --appendonly yes --appendfsync everysec --maxmemory 4gb --maxmemory-policy noeviction --save 900 1 --save 300 10 --save 3600 100000 --activedefrag yes --active-defrag-ignore-bytes 100mb --active-defrag-threshold-lower 10 --active-defrag-threshold-upper 100 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25
        fi
      '
    secrets:
      - redis_password
    volumes:
      - de_redis_data:/data
    networks:
      - de-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password 2>/dev/null)\" ping 2>/dev/null || redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # INGEST SERVICE - Germany
  # ============================================================
  de-ingest:
    build:
      context: ..
      dockerfile: ingest-service/Dockerfile
    container_name: de-ingest
    secrets:
      - db_password
      - redis_password
      - source: api_keys_germany
        target: api_keys
    environment:
      - INSTANCE_COUNTRY=de
      - PORT=3000
      - HOST=0.0.0.0
      - DB_HOST=cz-postgres
      - DB_PORT=5432
      - DB_NAME=landomo_de
      - DB_USER=${DB_USER:-landomo}
      - DB_PASSWORD=${DB_PASSWORD:-landomo_dev_pass}
      - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-20}
      - REDIS_HOST=de-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - API_KEYS=${API_KEYS_DE:-dev_key_de_1,dev_key_de_2}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10000}
      - BATCH_WORKERS=${BATCH_WORKERS:-10}
    ports:
      - "3012:3000"
    depends_on:
      de-redis:
        condition: service_healthy
    networks:
      - de-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # WORKER - Germany BullMQ processor
  # ============================================================
  de-worker:
    build:
      context: ..
      dockerfile: ingest-service/Dockerfile
    container_name: de-worker
    command: ["node", "dist/start-worker.js"]
    secrets:
      - db_password
      - redis_password
    environment:
      - INSTANCE_COUNTRY=de
      - DB_HOST=cz-postgres
      - DB_PORT=5432
      - DB_NAME=landomo_de
      - DB_USER=${DB_USER:-landomo}
      - DB_PASSWORD=${DB_PASSWORD:-landomo_dev_pass}
      - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-20}
      - REDIS_HOST=de-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10000}
      - BATCH_WORKERS=${BATCH_WORKERS:-10}
      - STALENESS_THRESHOLD_HOURS=${STALENESS_THRESHOLD_HOURS:-72}
      - STALENESS_CRON=${STALENESS_CRON:-0 */6 * * *}
      - STALENESS_BATCH_SIZE=${STALENESS_BATCH_SIZE:-500}
    depends_on:
      de-ingest:
        condition: service_healthy
    networks:
      - de-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -e /proc/1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # GERMANY SCRAPERS
  # ============================================================

  # ImmobilienScout24.de (largest German portal)
  scraper-immobilienscout24-de:
    build:
      context: ../../scrapers/Germany/immobilienscout24-de
    container_name: de-scraper-immobilienscout24
    environment:
      - PORT=8110
      - INGEST_API_URL=http://de-ingest:3000
      - INGEST_API_KEY=dev_key_de_1
      - REDIS_HOST=de-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8110:8110"
    depends_on:
      de-ingest:
        condition: service_healthy
    networks:
      - de-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8110/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Immonet.de
  scraper-immonet-de:
    build:
      context: ../../scrapers/Germany/immonet-de
    container_name: de-scraper-immonet
    environment:
      - PORT=8111
      - INGEST_API_URL=http://de-ingest:3000
      - INGEST_API_KEY=dev_key_de_1
      - REDIS_HOST=de-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8111:8111"
    depends_on:
      de-ingest:
        condition: service_healthy
    networks:
      - de-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8111/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Immowelt.de
  scraper-immowelt-de:
    build:
      context: ../../scrapers/Germany/immowelt-de
    container_name: de-scraper-immowelt
    environment:
      - PORT=8112
      - INGEST_API_URL=http://de-ingest:3000
      - INGEST_API_KEY=dev_key_de_1
      - REDIS_HOST=de-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8112:8112"
    depends_on:
      de-ingest:
        condition: service_healthy
    networks:
      - de-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8112/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Kleinanzeigen.de (classifieds)
  scraper-kleinanzeigen-de:
    build:
      context: ../../scrapers/Germany/kleinanzeigen-de
    container_name: de-scraper-kleinanzeigen
    environment:
      - PORT=8113
      - INGEST_API_URL=http://de-ingest:3000
      - INGEST_API_KEY=dev_key_de_1
      - REDIS_HOST=de-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8113:8113"
    depends_on:
      de-ingest:
        condition: service_healthy
    networks:
      - de-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8113/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # WG-Gesucht.de (shared housing)
  scraper-wg-gesucht-de:
    build:
      context: ../../scrapers/Germany/wg-gesucht-de
    container_name: de-scraper-wg-gesucht
    environment:
      - PORT=8114
      - INGEST_API_URL=http://de-ingest:3000
      - INGEST_API_KEY=dev_key_de_1
      - REDIS_HOST=de-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8114:8114"
    depends_on:
      de-ingest:
        condition: service_healthy
    networks:
      - de-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8114/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
