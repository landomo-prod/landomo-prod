;; PgBouncer Configuration for Landomo-World
;; Transaction pooling mode for high-throughput batch ingestion workloads

[databases]
;; One entry per country database, connecting to the upstream PostgreSQL
;; Host resolved via Docker DNS (service name "postgres")
landomo_australia = host=postgres port=5432 dbname=landomo_australia
landomo_uk = host=postgres port=5432 dbname=landomo_uk
landomo_usa = host=postgres port=5432 dbname=landomo_usa
landomo_czech = host=postgres port=5432 dbname=landomo_czech
landomo_france = host=postgres port=5432 dbname=landomo_france
landomo_spain = host=postgres port=5432 dbname=landomo_spain
landomo_italy = host=postgres port=5432 dbname=landomo_italy
landomo_slovakia = host=postgres port=5432 dbname=landomo_slovakia
landomo_germany = host=postgres port=5432 dbname=landomo_germany
landomo_hungary = host=postgres port=5432 dbname=landomo_hungary
landomo_austria = host=postgres port=5432 dbname=landomo_austria

;; Wildcard fallback: any database not listed above connects directly
* = host=postgres port=5432

[pgbouncer]
;; Listening
listen_addr = 0.0.0.0
listen_port = 6432

;; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Admin access (for SHOW commands and pgbouncer_exporter)
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

;; Pool mode: transaction mode is optimal for web/API workloads
;; Each transaction gets its own server connection, returned to pool after COMMIT
pool_mode = transaction

;; Connection limits
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Timeouts
server_connect_timeout = 5
server_login_retry = 3
query_timeout = 120
query_wait_timeout = 30
client_idle_timeout = 600
server_idle_timeout = 300
server_lifetime = 3600

;; Server connection reuse
server_reset_query = DISCARD ALL
server_check_query = SELECT 1
server_check_delay = 30

;; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

;; DNS
dns_max_ttl = 15

;; TLS (disabled for internal Docker network)
;; Enable in production with proper certs
; client_tls_sslmode = prefer
; server_tls_sslmode = prefer
