[server]
protocol = http
http_port = 3100
domain = localhost
root_url = http://localhost:3100

[auth.anonymous]
enabled = true
org_role = Viewer

[security]
admin_user = admin
admin_password = admin
allow_embedding = true

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/landomo-overview.json
