apiVersion: 1

policies:
  - orgId: 1
    receiver: landomo-ops-email
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical infrastructure alerts -> PagerDuty + Slack + Email
      - receiver: landomo-critical-pagerduty
        object_matchers:
          - [severity, =, critical]
          - [component, =~, "database|infrastructure"]
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 30m
        continue: true

      # Critical alerts -> Slack + Email
      - receiver: landomo-ops-slack
        object_matchers:
          - [severity, =, critical]
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 1h
        continue: true

      # Warning alerts -> Slack only
      - receiver: landomo-ops-slack
        object_matchers:
          - [severity, =, warning]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

      # Security alerts -> Security Slack channel
      - receiver: landomo-security-slack
        object_matchers:
          - [team, =, security]
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 30m

      # All other alerts -> Email
      - receiver: landomo-ops-email
        group_wait: 1m
        group_interval: 10m
        repeat_interval: 12h

    mute_time_intervals: []
