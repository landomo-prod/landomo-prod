version: '3.8'

# ============================================================
# Landomo-World Platform - Docker Compose Configuration
# ============================================================
# Single command startup for entire platform: docker compose up
# Includes: PostgreSQL, Redis, Ingest Services, Workers, Monitoring
# ============================================================
#
# SECRETS: Run ./scripts/init-secrets.sh to generate secret files.
# Services read from /run/secrets/<name> with env var fallback.
# ============================================================

# ============================================================
# DOCKER SECRETS - File-based secret management
# ============================================================
secrets:
  db_password:
    file: ./secrets/db_password
  db_read_password:
    file: ./secrets/db_read_password
  redis_password:
    file: ./secrets/redis_password
  grafana_password:
    file: ./secrets/grafana_password
  api_keys_australia:
    file: ./secrets/api_keys_australia
  api_keys_uk:
    file: ./secrets/api_keys_uk
  api_keys_usa:
    file: ./secrets/api_keys_usa
  api_keys_czech:
    file: ./secrets/api_keys_czech
  api_keys_france:
    file: ./secrets/api_keys_france
  api_keys_spain:
    file: ./secrets/api_keys_spain
  api_keys_italy:
    file: ./secrets/api_keys_italy
  api_keys_slovakia:
    file: ./secrets/api_keys_slovakia
  api_keys_hungary:
    file: ./secrets/api_keys_hungary
  api_keys_germany:
    file: ./secrets/api_keys_germany
  api_keys_austria:
    file: ./secrets/api_keys_austria
  api_keys_polygon:
    file: ./secrets/api_keys_polygon
  api_keys_ml_pricing:
    file: ./secrets/api_keys_ml_pricing

networks:
  landomo-net:
    driver: bridge
  landomo-cz-network:
    external: true

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  backup_data:
  minio_data:
  ml_models:

# ============================================================
# DEFAULT LOGGING - JSON file driver with rotation
# ============================================================
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    tag: "{{.Name}}"

services:

  # ============================================================
  # POSTGRESQL - Multi-database (one per country)
  # ============================================================
  postgres:
    logging: *default-logging
    build:
      context: ./postgres
    container_name: landomo-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-landomo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-landomo_dev_pass}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh
      - ./postgres/init-schema.sql:/docker-entrypoint-initdb.d/02-init-schema.sql
      - ./ingest-service/migrations:/docker-entrypoint-initdb.d/migrations
      - ./postgres/03-apply-migrations.sh:/docker-entrypoint-initdb.d/03-apply-migrations.sh
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - landomo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-landomo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # REDIS - Job Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: landomo-redis
    command: >
      sh -c '
        if [ -f /run/secrets/redis_password ]; then
          redis-server --appendonly yes --appendfsync everysec --maxmemory 4gb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000 --activedefrag yes --active-defrag-ignore-bytes 100mb --active-defrag-threshold-lower 10 --active-defrag-threshold-upper 100 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25 --requirepass "$$(cat /run/secrets/redis_password)"
        else
          redis-server --appendonly yes --appendfsync everysec --maxmemory 4gb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000 --activedefrag yes --active-defrag-ignore-bytes 100mb --active-defrag-threshold-lower 10 --active-defrag-threshold-upper 100 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25
        fi
      '
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - landomo-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password 2>/dev/null)\" ping 2>/dev/null || redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # PGBOUNCER - Connection pooling proxy
  # ============================================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: landomo-pgbouncer
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    secrets:
      - db_password
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: ${DB_USER:-landomo}
      DATABASES_PASSWORD: ${DB_PASSWORD:-landomo_dev_pass}
      DATABASES_DBNAME: postgres
      AUTH_TYPE: md5
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      ADMIN_USERS: pgbouncer_admin
      STATS_USERS: pgbouncer_stats
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - landomo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ============================================================
  # INGEST SERVICES - Multi-instance per country
  # ============================================================

  # Australia instance
  ingest-australia:
    build:
      context: .
      dockerfile: ingest-service/Dockerfile
    container_name: landomo-ingest-australia
    secrets:
      - db_password
      - redis_password
      - source: api_keys_australia
        target: api_keys
    environment:
      - INSTANCE_COUNTRY=australia
      - PORT=3000
      - HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=landomo_australia
      - DB_USER=${DB_USER:-landomo}
      - DB_PASSWORD=${DB_PASSWORD:-landomo_dev_pass}
      - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-20}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - API_KEYS=${API_KEYS_AUSTRALIA:-dev_key_aus_1,dev_key_aus_2}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10000}
      - BATCH_WORKERS=${BATCH_WORKERS:-5}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

