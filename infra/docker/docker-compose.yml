  # ============================================================
  # DATABASE BACKUP SERVICE
  # ============================================================
  # Automated daily backups with retention management.
  # Usage:
  #   docker compose --profile backup up -d backup
  #   Manual backup: docker compose --profile backup exec backup /scripts/backup-databases.sh --all
  #   Single country: docker compose --profile backup exec backup /scripts/backup-databases.sh --country czech

  backup:
    image: postgres:16
    container_name: landomo-backup
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=${DB_USER:-landomo}
      - PGPASSWORD=${DB_PASSWORD:-landomo_dev_pass}
      - BACKUP_DIR=/backups
      - BACKUP_FORMAT=${BACKUP_FORMAT:-custom}
      - BACKUP_CRON=${BACKUP_CRON:-0 2 * * *}
      - RETENTION_DAILY=${RETENTION_DAILY:-30}
      - RETENTION_MONTHLY=${RETENTION_MONTHLY:-12}
      - BACKUP_ON_START=${BACKUP_ON_START:-false}
      # S3 sync config (for offsite backups)
      - S3_BUCKET=${S3_BUCKET:-landomo-backups}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_PREFIX=${S3_PREFIX:-landomo-backups}
      - ENCRYPT_BACKUPS=${ENCRYPT_BACKUPS:-none}
    volumes:
      - ./scripts:/scripts
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - landomo-net
    restart: unless-stopped
    entrypoint: ["/scripts/backup-cron-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h postgres -U ${PGUSER:-landomo} || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - backup

  # ============================================================
  # MINIO - S3-compatible object storage for local dev/testing
  # ============================================================
  # Usage:
  #   docker compose --profile backup up -d minio
  #   Console: http://localhost:9001 (minioadmin/minioadmin)
  #   API:     http://localhost:9000

  minio:
    image: minio/minio
    container_name: landomo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - landomo-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    profiles:
      - backup

  # ============================================================
  # NGINX - API Gateway / Reverse Proxy with SSL termination
  # ============================================================
  # Start with: docker compose up -d nginx
  # SSL setup:  ./scripts/generate-ssl-prod.sh api.landomo.com admin@landomo.com
  # Dev SSL:    ./scripts/generate-ssl-dev.sh

  nginx:
    image: nginx:1.27-alpine
    container_name: landomo-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - ../nginx/certbot-webroot:/var/www/certbot:ro
    networks:
      - landomo-net
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  # ============================================================
  # CERTBOT - Let's Encrypt certificate management (production)
  # ============================================================
  # Usage:
  #   docker compose --profile ssl run --rm certbot certonly --webroot --webroot-path=/var/www/certbot -d api.landomo.com
  #   docker compose --profile ssl run --rm certbot renew
  # Or use the helper script: ./scripts/generate-ssl-prod.sh api.landomo.com

  certbot:
    image: certbot/certbot
    container_name: landomo-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/certbot-webroot:/var/www/certbot
    profiles:
      - ssl
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

  # ============================================================
  # MONITORING STACK (Optional)
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: landomo-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/backup-alert.yml:/etc/prometheus/backup-alert.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - alertmanager
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: landomo-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - monitoring

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: landomo-postgres-exporter
    secrets:
      - db_password
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-landomo}:${DB_PASSWORD:-landomo_dev_pass}@postgres:5432/postgres?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/postgres-queries.yml
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
      PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1"
    volumes:
      - ./monitoring/postgres-queries.yml:/etc/postgres-exporter/postgres-queries.yml:ro
      - ./monitoring/postgres-replication-queries.yml:/etc/postgres-exporter/postgres-replication-queries.yml:ro
      - ./monitoring/autovacuum-queries.yml:/etc/postgres-exporter/autovacuum-queries.yml:ro
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - monitoring

  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:latest
    container_name: landomo-pgbouncer-exporter
    environment:
      PGBOUNCER_EXPORTER_HOST: pgbouncer
      PGBOUNCER_EXPORTER_PORT: 6432
      PGBOUNCER_EXPORTER_USER: pgbouncer_stats
      PGBOUNCER_EXPORTER_PASS: pgbouncer_stats_pass
    ports:
      - "${PGBOUNCER_EXPORTER_PORT:-9127}:9127"
    depends_on:
      - pgbouncer
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9127/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - monitoring

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: landomo-redis-exporter
    secrets:
      - redis_password
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9121/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: landomo-node-exporter
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - '/:/host:ro,rslave'
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: landomo-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "${CADVISOR_PORT:-8080}:8080"
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: landomo-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - monitoring

  # ============================================================
  # POLYGON SERVICE - Administrative boundary polygons
  # ============================================================

  polygon-service:
    build:
      context: .
      dockerfile: polygon-service/Dockerfile
    container_name: landomo-polygon-service
    secrets:
      - redis_password
      - source: api_keys_polygon
        target: api_keys
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POLYGON_DB_NAME:-landomo_czech}
      - DB_USER=${DB_USER:-landomo}
      - DB_PASSWORD=${DB_PASSWORD:-landomo_dev_pass}
      - DB_MAX_CONNECTIONS=${POLYGON_DB_MAX_CONNECTIONS:-10}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CACHE_TTL_SECONDS=${POLYGON_CACHE_TTL:-3600}
      - API_KEYS=${API_KEYS_POLYGON:-dev_key_polygon_1}
      - LOG_LEVEL=${POLYGON_LOG_LEVEL:-info}
      - OVERPASS_API_URL=${OVERPASS_API_URL:-https://overpass-api.de/api/interpreter}
      - OVERPASS_TIMEOUT=${OVERPASS_TIMEOUT:-6000}
      - OVERPASS_RETRY_DELAY=${OVERPASS_RETRY_DELAY:-5000}
      - OVERPASS_MAX_RETRIES=${OVERPASS_MAX_RETRIES:-3}
    ports:
      - "${POLYGON_SERVICE_PORT:-4300}:3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # SEARCH SERVICE - GraphQL + REST API for Property Search
  # ============================================================

  search-service:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    container_name: landomo-search-service
    secrets:
      - db_read_password
      - redis_password
    environment:
      - PORT=4000
      - HOST=0.0.0.0
      - NODE_ENV=${NODE_ENV:-production}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_READ_USER=${DB_READ_USER:-search_readonly}
      - DB_READ_PASSWORD=${DB_READ_PASSWORD:-search_readonly_pass}
      - DB_MAX_CONNECTIONS=${SEARCH_DB_MAX_CONNECTIONS:-10}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - DEFAULT_SEARCH_LIMIT=${DEFAULT_SEARCH_LIMIT:-20}
      - MAX_SEARCH_LIMIT=${MAX_SEARCH_LIMIT:-100}
      - DEFAULT_GEO_RADIUS_KM=${DEFAULT_GEO_RADIUS_KM:-10}
      - MAX_GEO_RADIUS_KM=${MAX_GEO_RADIUS_KM:-100}
      - CACHE_SEARCH_TTL=${CACHE_SEARCH_TTL:-300}
      - CACHE_DETAIL_TTL=${CACHE_DETAIL_TTL:-1800}
      - CACHE_AGGREGATION_TTL=${CACHE_AGGREGATION_TTL:-3600}
      - CACHE_INVALIDATION_CHANNEL=${CACHE_INVALIDATION_CHANNEL:-property:updated}
      - LOG_LEVEL=${SEARCH_LOG_LEVEL:-info}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
    ports:
      - "${SEARCH_SERVICE_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # FRONTEND DESKTOP - Next.js 16 Web Application
  # ============================================================

  frontend-desktop:
    build:
      context: ./frontend-desktop
    container_name: landomo-frontend-desktop
    environment:
      # API URLs (internal Docker network)
      - NEXT_PUBLIC_SEARCH_API_URL=${NEXT_PUBLIC_SEARCH_API_URL:-http://search-service:4000/api/v1}
      - NEXT_PUBLIC_POLYGON_API_URL=${NEXT_PUBLIC_POLYGON_API_URL:-http://polygon-service:3100/api/v1}
      # Map Configuration
      - NEXT_PUBLIC_DEFAULT_CENTER_LAT=${NEXT_PUBLIC_DEFAULT_CENTER_LAT:-50.0755}
      - NEXT_PUBLIC_DEFAULT_CENTER_LNG=${NEXT_PUBLIC_DEFAULT_CENTER_LNG:-14.4378}
      - NEXT_PUBLIC_DEFAULT_ZOOM=${NEXT_PUBLIC_DEFAULT_ZOOM:-12}
      # Build Configuration
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Analytics (optional)
      - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
      # Feature Flags (optional)
      - NEXT_PUBLIC_ENABLE_SAVED_SEARCHES=${NEXT_PUBLIC_ENABLE_SAVED_SEARCHES:-true}
      - NEXT_PUBLIC_ENABLE_PRICE_ALERTS=${NEXT_PUBLIC_ENABLE_PRICE_ALERTS:-false}
      - NEXT_PUBLIC_ENABLE_COMPARISON=${NEXT_PUBLIC_ENABLE_COMPARISON:-true}
      - NEXT_PUBLIC_MAX_COMPARE_PROPERTIES=${NEXT_PUBLIC_MAX_COMPARE_PROPERTIES:-4}
    ports:
      - "${FRONTEND_DESKTOP_PORT:-3001}:3000"
    depends_on:
      polygon-service:
        condition: service_healthy
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # JAEGER - Distributed Tracing (OpenTelemetry)
  # ============================================================

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: landomo-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"       # Jaeger UI
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"  # OTLP gRPC
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"  # OTLP HTTP
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - monitoring

  # ============================================================
  # LOKI + PROMTAIL - Centralized Logging
  # ============================================================

  loki:
    image: grafana/loki:3.4.2
    container_name: landomo-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - monitoring

  promtail:
    image: grafana/promtail:3.4.2
    container_name: landomo-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - landomo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - monitoring

  # Monitoring

  # Bazos scraper (development mode with volume mounts)
  scraper-bazos-dev:
    image: node:20-alpine
    container_name: landomo-scraper-bazos-dev
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "8108:3000"
    environment:
      - PORT=3000
      - INGEST_API_URL=http://landomo-ingest-czech:3000
      - INGEST_API_KEY_FILE=/run/secrets/api_keys
      - MAX_PAGES=10000
    volumes:
      - ../scrapers/Czech Republic/bazos:/app
      - ../shared-components:/shared-components
    secrets:
      - api_keys_czech
    networks:
      - landomo-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - ingest-czech
      - redis

  # ============================================================
  # ML PRICING SERVICE - Machine Learning Price Prediction API
  # ============================================================

  ml-pricing-service:
    build:
      context: ..
      dockerfile: ml-pricing-service/Dockerfile
    container_name: landomo-ml-pricing
    secrets:
      - db_read_password
      - redis_password
      - api_keys_ml_pricing
    environment:
      # Server Config
      - PORT=3500
      - HOST=0.0.0.0
      - NODE_ENV=${NODE_ENV:-production}
      
      # Database (Read-Only Multi-Country Access)
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_READ_USER=ml_pricing_readonly
      - DB_READ_PASSWORD=${DB_READ_PASSWORD:-ml_pricing_readonly_pass}
      - DB_MAX_CONNECTIONS=${ML_PRICING_DB_MAX_CONNECTIONS:-10}
      
      # Redis Cache
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MODEL_CACHE_TTL=${MODEL_CACHE_TTL:-86400}
      - PREDICTION_CACHE_TTL=${PREDICTION_CACHE_TTL:-3600}
      
      # API Authentication
      - API_KEYS=${API_KEYS_ML_PRICING:-dev_ml_key_1}
      
      # ML Model Configuration
      - MODELS_DIR=/app/models
      - PYTHON_PATH=/app/ml-pricing-service/ml
      - ML_WORKER_CONCURRENCY=${ML_WORKER_CONCURRENCY:-2}
      
      # Training Configuration
      - TRAINING_CRON=${TRAINING_CRON:-0 2 * * 0}
      - MIN_TRAINING_SAMPLES=${MIN_TRAINING_SAMPLES:-100}
      - TEST_SPLIT=${TEST_SPLIT:-0.2}
      
      # Logging
      - LOG_LEVEL=${ML_PRICING_LOG_LEVEL:-info}
      
    volumes:
      - ml_models:/app/models
    
    ports:
      - "${ML_PRICING_PORT:-3500}:3500"
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    networks:
      - landomo-net
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3500/api/v1/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
