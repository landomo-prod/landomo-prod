version: '3.8'

services:
  idnes-reality-scraper:
    build:
      context: ../../..
      dockerfile: scrapers/Czech Republic/idnes-reality/Dockerfile
    container_name: idnes-reality-scraper
    restart: unless-stopped
    ports:
      - "8087:8087"
    env_file:
      - .env.docker
    networks:
      - landomo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "scraper.name=idnes-reality"
      - "scraper.country=czech-republic"
      - "scraper.category=primary"

networks:
  landomo-network:
    external: true
