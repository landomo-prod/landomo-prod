version: '3.8'

services:
  reality-scraper:
    build:
      context: ../../..
      dockerfile: scrapers/Czech Republic/reality/Dockerfile
    container_name: reality-scraper
    restart: unless-stopped
    ports:
      - "8104:8104"
    env_file:
      - .env.docker
    networks:
      - landomo-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8104/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "scraper.name=reality"
      - "scraper.country=czech-republic"
      - "scraper.category=primary"

networks:
  landomo-network:
    external: true
