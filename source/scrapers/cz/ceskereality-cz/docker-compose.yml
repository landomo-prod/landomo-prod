version: '3.8'

services:
  ceskereality-scraper:
    build:
      context: ../../..
      dockerfile: scrapers/Czech Republic/ceskereality/Dockerfile
    container_name: ceskereality-scraper
    restart: unless-stopped
    ports:
      - "8109:8109"
    env_file:
      - .env.docker
    networks:
      - landomo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8109/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "scraper.name=ceskereality"
      - "scraper.country=czech-republic"
      - "scraper.category=primary"

networks:
  landomo-network:
    external: true
