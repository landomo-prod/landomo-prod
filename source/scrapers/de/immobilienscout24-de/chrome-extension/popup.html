<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    h2 {
      margin: 0 0 15px 0;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    #extract {
      background: #4CAF50;
      color: white;
    }
    #extract:hover {
      background: #45a049;
    }
    #exportJson {
      background: #2196F3;
      color: white;
    }
    #exportJson:hover {
      background: #0b7dda;
    }
    #sendToApi {
      background: #FF9800;
      color: white;
    }
    #sendToApi:hover {
      background: #e68900;
    }
    #status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    #results {
      margin-top: 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h2>🏠 ImmobilienScout24 Extractor</h2>

  <button id="extract">📦 Extract Listings from Page</button>
  <button id="exportJson">💾 Export as JSON</button>
  <button id="sendToApi">🚀 Send to Ingest API</button>

  <div id="status"></div>
  <div id="results"></div>

  <script src="popup.js"></script>
</body>
</html>
